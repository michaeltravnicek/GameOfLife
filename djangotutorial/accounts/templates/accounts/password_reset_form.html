{% extends "base.html" %}

{% block title %}Zapomenuté heslo — Game of Yolo{% endblock %}

{% block content %}
<section class="section" style="margin-top: 1.5rem; max-width: 480px; margin-left: auto; margin-right: auto;">
    <div class="card anim-fade-up" style="padding: 3rem 2rem; background: #fff; border-top: 4px solid var(--gol-indigo-primary);">
        <h1 style="font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 32px; margin: 0 0 0.5rem; color: var(--gol-indigo-primary);">
            Zapomenuté heslo
        </h1>
        <p class="text-muted" style="margin: 0 0 2rem; font-size: 15px;">
            Zadej svůj e-mail a pošleme ti odkaz pro reset hesla.
        </p>

        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 1.5rem;">
                <label style="font-family: 'Inter', sans-serif; font-weight: 500; font-size: 11px; text-transform: uppercase; color: var(--gol-text-muted); display: block; margin-bottom: 0.5rem; letter-spacing: 0.5px;">
                    E-mail
                </label>
                <input type="email" name="email" required autofocus
                       class="field-input"
                       placeholder="tvuj@email.cz"
                       autocomplete="email">
            </div>
            {% if form.errors %}
                <p style="color: #d32f2f; font-size: 13px; margin-bottom: 1rem;">{{ form.email.errors }}</p>
            {% endif %}
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.85rem; font-size: 16px;">
                Odeslat odkaz
            </button>
        </form>

        <p style="margin-top: 1.5rem; font-size: 14px; text-align: center;">
            <a href="{% url 'login' %}" class="slide-link">Zpět na přihlášení</a>
        </p>
    </div>
</section>
{% endblock %}
