{% extends "base.html" %}

{% block title %}E-mail odeslán — Game of Yolo{% endblock %}

{% block content %}
<section class="section" style="margin-top: 1.5rem; max-width: 480px; margin-left: auto; margin-right: auto;">
    <div class="card anim-fade-up" style="padding: 3rem 2rem; background: #fff; border-top: 4px solid var(--gol-green); text-align: center;">
        <div style="font-size: 48px; margin-bottom: 1rem;">📬</div>
        <h1 style="font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 28px; margin: 0 0 1rem; color: var(--gol-indigo-primary);">
            E-mail odeslán!
        </h1>
        <p style="font-size: 15px; line-height: 1.6; color: var(--gol-text-dark); margin: 0 0 2rem;">
            Pokud existuje účet s tímto e-mailem, pošleme ti odkaz pro reset hesla.
            Zkontroluj svou schránku (i spam).
        </p>
        <a href="{% url 'login' %}" class="btn btn-primary">Zpět na přihlášení</a>
    </div>
</section>
{% endblock %}
