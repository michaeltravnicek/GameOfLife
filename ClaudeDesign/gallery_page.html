<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Galerie — Game of Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="colors_and_type.css" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#1a0f0a;font-family:var(--font-body);color:var(--color-cream-light);-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer}
a{color:inherit;text-decoration:none}

/* BG */
.bg-texture{position:fixed;inset:0;z-index:0;background:url('assets/Grain_texture_blue.png') center/cover}
.bg-texture::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(26,15,10,.60) 0%,rgba(26,15,10,.82) 55%,rgba(26,15,10,.97) 100%)}

/* HERO */
.hero{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:130px 24px 10px;text-align:center}
.eyebrow{font-family:var(--font-mono);font-style:italic;font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--color-pink);margin-bottom:8px;display:inline-flex;align-items:center;gap:10px}
.eyebrow::before,.eyebrow::after{content:'✦';font-size:11px;opacity:.9}
.hero h1{font-family:var(--font-display);font-size:clamp(70px,10vw,140px);line-height:.92;color:var(--color-cream-light);text-transform:uppercase;letter-spacing:.03em;text-shadow:0 6px 34px rgba(0,0,0,.6)}
.hero .tagline{font-family:var(--font-body);font-style:italic;font-size:14px;color:rgba(255,241,212,.70);max-width:560px;margin:10px auto 0;line-height:1.5}
.divider{width:120px;height:1px;margin:20px auto 0;background:repeating-linear-gradient(90deg,rgba(255,241,212,.45) 0 5px,transparent 5px 10px)}

/* VIEW TOGGLE */
.view-toggle{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;gap:6px;margin:28px auto 0;padding:5px;background:rgba(26,15,10,.50);border:1.5px dashed rgba(255,241,212,.28);border-radius:9999px;backdrop-filter:blur(8px);width:fit-content}
.vt-btn{font-family:var(--font-body);font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:9px 22px;border-radius:9999px;cursor:pointer;background:transparent;border:0;color:rgba(255,241,212,.65);transition:all .18s;display:flex;align-items:center;gap:7px}
.vt-btn:hover{color:#fff}
.vt-btn.on{background:var(--color-pink);color:#fff;box-shadow:0 4px 14px rgba(225,84,99,.45)}
.vt-icon{font-size:14px;line-height:1}

/* ── SLIDESHOW VIEW ── */
#view-slideshow{display:block}
.counter{position:relative;z-index:2;text-align:center;margin-top:14px;font-family:var(--font-mono);font-style:italic;font-size:12px;letter-spacing:.2em;color:rgba(255,241,212,.40)}
.counter span{color:rgba(255,241,212,.75)}

.gal-container{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;gap:6px;padding:24px 0 0;height:calc(100vh - 340px);min-height:340px;max-height:660px;overflow:hidden}
.gal-side{width:clamp(110px,15vw,220px);height:100%;background-size:cover;background-position:center;border:2px solid rgba(255,255,255,.70);opacity:.40;cursor:pointer;flex-shrink:0;transition:opacity .25s,filter .25s;filter:brightness(.70) saturate(.75)}
.gal-side:hover{opacity:.70;filter:brightness(.95) saturate(1)}
.gal-main{flex:1;height:100%;background-size:cover;background-position:center;border:2px solid #fff;position:relative;overflow:hidden;min-width:0}
.gal-zone{position:absolute;top:0;bottom:0;width:50%;z-index:3;display:flex;align-items:center;transition:background .18s}
.gal-zone-left{left:0;justify-content:flex-start;padding-left:20px;cursor:w-resize}
.gal-zone-right{right:0;justify-content:flex-end;padding-right:20px;cursor:e-resize}
.gal-zone-left:hover{background:linear-gradient(90deg,rgba(26,15,10,.38),transparent)}
.gal-zone-right:hover{background:linear-gradient(270deg,rgba(26,15,10,.38),transparent)}
.gal-zone-arrow{width:46px;height:46px;border-radius:50%;background:rgba(26,15,10,.55);border:1.5px dashed rgba(255,255,255,.55);display:flex;align-items:center;justify-content:center;color:rgba(255,241,212,.9);font-size:22px;opacity:0;transition:opacity .18s;backdrop-filter:blur(6px);pointer-events:none}
.gal-zone:hover .gal-zone-arrow{opacity:1}
.gal-caption{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:32px 22px 18px;background:linear-gradient(0deg,rgba(26,15,10,.80) 0%,transparent 100%);pointer-events:none}
.gal-caption-label{font-family:var(--font-mono);font-style:italic;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,241,212,.52);margin-bottom:3px}
.gal-caption-title{font-family:var(--font-display);font-size:clamp(22px,3vw,38px);letter-spacing:.04em;text-transform:uppercase;color:var(--color-cream-light);line-height:1}

.gal-dots{position:relative;z-index:2;display:flex;gap:6px;justify-content:center;margin-top:20px}
.gal-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,241,212,.25);cursor:pointer;transition:background .18s,transform .18s}
.gal-dot.on{background:var(--color-pink);transform:scale(1.4)}

/* ── CALENDAR VIEW ── */
#view-calendar{display:none;position:relative;z-index:2;max-width:1200px;margin:0 auto;padding:28px 24px 60px}

/* Month filter chips */
.month-filters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:40px}
.mf-chip{font-family:var(--font-mono);font-style:italic;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:8px 18px;border-radius:9999px;cursor:pointer;background:rgba(26,15,10,.50);border:1.5px dashed rgba(255,241,212,.28);color:rgba(255,241,212,.68);transition:all .18s;backdrop-filter:blur(8px)}
.mf-chip:hover{color:#fff;border-color:rgba(255,241,212,.55)}
.mf-chip.on{background:var(--color-pink);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(225,84,99,.42)}

/* Month section */
.month-section{margin-bottom:52px}
.month-heading{font-family:var(--font-display);font-size:clamp(32px,4vw,52px);letter-spacing:.06em;text-transform:uppercase;color:var(--color-cream-light);margin-bottom:6px;display:flex;align-items:center;gap:16px}
.month-heading::after{content:'';flex:1;height:1px;background:repeating-linear-gradient(90deg,rgba(255,241,212,.32) 0 6px,transparent 6px 12px)}
.month-count{font-family:var(--font-mono);font-style:italic;font-size:13px;color:rgba(255,241,212,.45);letter-spacing:.1em;margin-bottom:20px}

/* Photo grid — masonry-like columns */
.photo-grid{columns:3;column-gap:8px}
.photo-item{break-inside:avoid;margin-bottom:8px;position:relative;overflow:hidden;cursor:pointer;border:2px solid rgba(255,255,255,.0);transition:border-color .22s,transform .22s}
.photo-item:hover{border-color:var(--color-pink);transform:scale(.99)}
.photo-item img{width:100%;display:block;transition:filter .25s}
.photo-item:hover img{filter:brightness(1.08) saturate(1.1)}
.photo-item-caption{position:absolute;bottom:0;left:0;right:0;padding:18px 14px 10px;background:linear-gradient(0deg,rgba(26,15,10,.75) 0%,transparent 100%);opacity:0;transition:opacity .22s;pointer-events:none}
.photo-item:hover .photo-item-caption{opacity:1}
.photo-item-label{font-family:var(--font-mono);font-style:italic;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,241,212,.55)}
.photo-item-title{font-family:var(--font-display);font-size:20px;letter-spacing:.04em;color:var(--color-cream-light);line-height:1;text-transform:uppercase}

@media(max-width:900px){.photo-grid{columns:2}}
@media(max-width:560px){.photo-grid{columns:1}}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.94);display:none;align-items:center;justify-content:center;padding:40px}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:85vh;border:2px solid rgba(255,255,255,.85);border-radius:3px;box-shadow:0 24px 80px rgba(0,0,0,.7)}
.lb-close{position:absolute;top:18px;right:26px;background:transparent;border:0;color:#fff;font-size:38px;cursor:pointer;line-height:1;opacity:.7;transition:opacity .15s}
.lb-close:hover{opacity:1}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s}
.lb-nav:hover{background:rgba(255,255,255,.22)}
.lb-nav.prev{left:28px}
.lb-nav.next{right:28px}
.lb-info{position:absolute;bottom:24px;left:0;right:0;text-align:center;font-family:var(--font-mono);font-style:italic;font-size:12px;letter-spacing:.12em;color:rgba(255,255,255,.5)}

/* CTA */
.gallery-footer{position:relative;z-index:2;text-align:center;padding:24px 0 56px}
.btn-pill{display:inline-flex;align-items:center;gap:12px;background:var(--color-pink);color:#fff;border:0;cursor:pointer;font-family:var(--font-body);font-size:14px;font-weight:700;letter-spacing:.03em;padding:13px 28px;border-radius:9999px;box-shadow:0 6px 22px rgba(225,84,99,.38);transition:transform .18s,background .18s;text-decoration:none}
.btn-pill:hover{background:#cf4453;transform:translateY(-1px)}

@media(max-width:820px){.gal-side{width:clamp(70px,13vw,130px)}.gal-container{height:calc(100vh - 370px);min-height:260px}}
@media(max-width:640px){.view-toggle{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="bg-texture"></div>

<div id="nav-root"></div>
<script>window.GOL_PAGE='gallery'</script>
<script src="nav.js"></script>

<div class="hero">
  <div class="eyebrow">Game of Life</div>
  <h1>Galerie</h1>
  <p class="tagline">Vzpomínky, zážitky a okamžiky, které stojí za to si připomenout.</p>
  <div class="divider"></div>
</div>

<!-- VIEW TOGGLE -->
<div class="view-toggle">
  <button class="vt-btn on" id="btn-slideshow"><span class="vt-icon">▶</span> Slideshow</button>
  <button class="vt-btn" id="btn-calendar"><span class="vt-icon">▦</span> Kalendář</button>
</div>

<!-- ── SLIDESHOW VIEW ── -->
<div id="view-slideshow">
  <div class="counter"><span id="cur">1</span> / <span id="total">1</span></div>
  <div class="gal-container">
    <div class="gal-side" id="gal-left"></div>
    <div class="gal-main" id="gal-main">
      <div class="gal-zone gal-zone-left" id="btn-prev"><div class="gal-zone-arrow">‹</div></div>
      <div class="gal-zone gal-zone-right" id="btn-next"><div class="gal-zone-arrow">›</div></div>
      <div class="gal-caption">
        <div class="gal-caption-label" id="cap-label">Game of Life</div>
        <div class="gal-caption-title" id="cap-title"></div>
      </div>
    </div>
    <div class="gal-side" id="gal-right"></div>
  </div>
  <div class="gal-dots" id="gal-dots"></div>
</div>

<!-- ── CALENDAR VIEW ── -->
<div id="view-calendar">
  <div class="month-filters" id="month-filters"></div>
  <div id="calendar-content"></div>
</div>

<div class="gallery-footer">
  <a href="events.html" class="btn-pill">Zobrazit nadcházející akce ➤</a>
</div>

<div id="footer-root"></div>
<script src="footer.js"></script>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">×</button>
  <button class="lb-nav prev" id="lb-prev">‹</button>
  <img id="lb-img" src="" alt="" />
  <button class="lb-nav next" id="lb-next">›</button>
  <div class="lb-info" id="lb-info"></div>
</div>

<script>
// ── DATA ──
const PHOTOS = [
  // Duben 2026
  {src:'gallery/gal0.jpg',        label:'Akce',     title:'Táborák na náměstí',  month:'2026-04', event:'Táborák'},
  {src:'gallery/gal3.jpg',        label:'Komunita', title:'Skupinové foto',       month:'2026-04', event:'Táborák'},
  {src:'https://picsum.photos/seed/gol13/900/700', label:'Komunita', title:'After party', month:'2026-04', event:'Táborák'},

  // Květen 2026
  {src:'gallery/gal1.jpg',        label:'Výzva',    title:'Frog Jumps',           month:'2026-05', event:'Frog Jumps'},
  {src:'gallery/gal2.jpg',        label:'Výzva',    title:'Na startu',            month:'2026-05', event:'Frog Jumps'},
  {src:'https://picsum.photos/seed/gol5/900/600',  label:'Tanec',    title:'Dance Class',          month:'2026-05', event:'Dance Class'},
  {src:'https://picsum.photos/seed/gol6/900/1100', label:'Tanec',    title:'Na parketu',           month:'2026-05', event:'Dance Class'},
  {src:'https://picsum.photos/seed/gol14/900/650', label:'Komunita', title:'Po akci',              month:'2026-05', event:'Dance Class'},

  // Červen 2026
  {src:'https://picsum.photos/seed/gol7/900/700',  label:'Výzva',    title:'C50 — start',          month:'2026-06', event:'C50'},
  {src:'https://picsum.photos/seed/gol8/900/600',  label:'Výzva',    title:'C50 — v půlce',        month:'2026-06', event:'C50'},
  {src:'https://picsum.photos/seed/gol9/900/900',  label:'Akce',     title:'Karaoke Night',        month:'2026-06', event:'Karaoke'},
  {src:'https://picsum.photos/seed/gol10/900/700', label:'Akce',     title:'Mikrofon',             month:'2026-06', event:'Karaoke'},

  // Červenec 2026
  {src:'https://picsum.photos/seed/gol11/900/650', label:'Výzva',    title:'Nahá Míle — start',    month:'2026-07', event:'Nahá Míle'},
  {src:'https://picsum.photos/seed/gol12/900/800', label:'Výzva',    title:'Cílová páska',         month:'2026-07', event:'Nahá Míle'},
  {src:'https://picsum.photos/seed/gol15/900/600', label:'Akce',     title:'Silent Disco',         month:'2026-07', event:'Silent Disco'},
];

const MONTH_NAMES = {
  '2026-04':'Duben 2026',
  '2026-05':'Květen 2026',
  '2026-06':'Červen 2026',
  '2026-07':'Červenec 2026',
};

// ── LIGHTBOX ──
let lbPhotos = PHOTOS, lbIndex = 0;
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');
const lbInfo = document.getElementById('lb-info');

function openLb(photos, i) {
  lbPhotos = photos; lbIndex = i;
  lbImg.src = lbPhotos[lbIndex].src;
  lbInfo.textContent = `${lbPhotos[lbIndex].event} · ${lbPhotos[lbIndex].title}`;
  lb.classList.add('open');
}
function closeLb(){ lb.classList.remove('open') }
function lbStep(d){ lbIndex=(lbIndex+d+lbPhotos.length)%lbPhotos.length; lbImg.src=lbPhotos[lbIndex].src; lbInfo.textContent=`${lbPhotos[lbIndex].event} · ${lbPhotos[lbIndex].title}`; }
document.getElementById('lb-close').addEventListener('click', closeLb);
document.getElementById('lb-prev').addEventListener('click', ()=>lbStep(-1));
document.getElementById('lb-next').addEventListener('click', ()=>lbStep(1));
lb.addEventListener('click', e=>{ if(e.target===lb) closeLb() });
document.addEventListener('keydown', e=>{
  if(!lb.classList.contains('open')) return;
  if(e.key==='Escape') closeLb();
  if(e.key==='ArrowLeft') lbStep(-1);
  if(e.key==='ArrowRight') lbStep(1);
});

// ── SLIDESHOW ──
const n = PHOTOS.length;
let cur = 0;
const elMain = document.getElementById('gal-main');
const elLeft = document.getElementById('gal-left');
const elRight = document.getElementById('gal-right');
const elDots = document.getElementById('gal-dots');
const elCur = document.getElementById('cur');
const elTotal = document.getElementById('total');
const elCapLabel = document.getElementById('cap-label');
const elCapTitle = document.getElementById('cap-title');
elTotal.textContent = n;

function bg(url){ return `url('${url}') center/cover no-repeat` }
function renderSlide(idx){
  const p=PHOTOS[idx], prev=PHOTOS[(idx-1+n)%n], next=PHOTOS[(idx+1)%n];
  elMain.style.background=bg(p.src);
  elLeft.style.background=bg(prev.src);
  elRight.style.background=bg(next.src);
  elCapLabel.textContent=p.label; elCapTitle.textContent=p.title;
  elCur.textContent=idx+1;
  elDots.querySelectorAll('.gal-dot').forEach((d,i)=>d.classList.toggle('on',i===idx));
}
function goSlide(idx){ cur=((idx%n)+n)%n; renderSlide(cur) }

PHOTOS.forEach((_,i)=>{
  const d=document.createElement('div'); d.className='gal-dot'+(i===0?' on':'');
  d.addEventListener('click',()=>goSlide(i)); elDots.appendChild(d);
});
document.getElementById('btn-prev').addEventListener('click',()=>goSlide(cur-1));
document.getElementById('btn-next').addEventListener('click',()=>goSlide(cur+1));
elLeft.addEventListener('click',()=>goSlide(cur-1));
elRight.addEventListener('click',()=>goSlide(cur+1));

// click main → open lightbox
elMain.addEventListener('click', e=>{
  if(e.target.closest('.gal-zone')) return; // let zone handle it
  openLb(PHOTOS, cur);
});

renderSlide(0);

// ── CALENDAR ──
const months = [...new Set(PHOTOS.map(p=>p.month))];
let activeMonth = 'all';

function buildMonthFilters(){
  const root = document.getElementById('month-filters');
  root.innerHTML = '';
  const all = document.createElement('button');
  all.className='mf-chip on'; all.textContent='Vše'; all.dataset.m='all';
  root.appendChild(all);
  months.forEach(m=>{
    const b=document.createElement('button');
    b.className='mf-chip'; b.textContent=MONTH_NAMES[m]||m; b.dataset.m=m;
    root.appendChild(b);
  });
  root.querySelectorAll('.mf-chip').forEach(b=>{
    b.addEventListener('click',()=>{
      root.querySelectorAll('.mf-chip').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); activeMonth=b.dataset.m; buildCalendarContent();
    });
  });
}

function buildCalendarContent(){
  const root = document.getElementById('calendar-content');
  root.innerHTML='';
  const visibleMonths = activeMonth==='all' ? months : [activeMonth];
  visibleMonths.forEach(m=>{
    const photos = PHOTOS.filter(p=>p.month===m);
    const sec = document.createElement('div'); sec.className='month-section';
    sec.innerHTML=`<div class="month-heading">${MONTH_NAMES[m]||m}</div><div class="month-count">${photos.length} ${photos.length===1?'fotografie':'fotografií'}</div>`;
    const grid=document.createElement('div'); grid.className='photo-grid';
    photos.forEach((p,i)=>{
      const item=document.createElement('div'); item.className='photo-item';
      item.innerHTML=`<img src="${p.src}" alt="${p.title}" loading="lazy" /><div class="photo-item-caption"><div class="photo-item-label">${p.label}</div><div class="photo-item-title">${p.title}</div></div>`;
      item.addEventListener('click',()=>openLb(photos,i));
      grid.appendChild(item);
    });
    sec.appendChild(grid); root.appendChild(sec);
  });
}

buildMonthFilters();
buildCalendarContent();

// ── VIEW TOGGLE ──
const viewSlideshow = document.getElementById('view-slideshow');
const viewCalendar = document.getElementById('view-calendar');
const btnSlideshow = document.getElementById('btn-slideshow');
const btnCalendar = document.getElementById('btn-calendar');

btnSlideshow.addEventListener('click',()=>{
  viewSlideshow.style.display='block'; viewCalendar.style.display='none';
  btnSlideshow.classList.add('on'); btnCalendar.classList.remove('on');
});
btnCalendar.addEventListener('click',()=>{
  viewSlideshow.style.display='none'; viewCalendar.style.display='block';
  btnCalendar.classList.add('on'); btnSlideshow.classList.remove('on');
});

// swipe on slideshow
let tx=0;
elMain.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
elMain.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40)goSlide(dx<0?cur+1:cur-1)});
</script>
</body>
</html>
