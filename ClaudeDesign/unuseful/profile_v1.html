<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Profil V1 — Game of Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="colors_and_type.css" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);color:var(--color-cream-light);-webkit-font-smoothing:antialiased;background:var(--color-dark-brown);overflow-x:hidden}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer}
a{color:inherit;text-decoration:none}

.stage{position:fixed;inset:0;z-index:-2;background:url('gallery/gal3.jpg') center 28%/cover no-repeat;filter:saturate(.7) contrast(1.04);transform:scale(1.05)}
.stage::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 55% at 50% 0%,rgba(45,42,142,.35) 0%,transparent 60%),linear-gradient(180deg,rgba(26,15,10,.12) 0%,rgba(26,15,10,.30) 45%,rgba(26,15,10,.92) 100%)}
.grain{position:fixed;inset:0;z-index:-1;pointer-events:none;background:url('assets/Grain_texture_brown.png') center/cover;opacity:.07;mix-blend-mode:overlay}

/* ── HERO ── */
.hero{position:relative;z-index:2;height:100vh;min-height:600px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden}
.hero-inner{padding:0 24px 80px}
.eyebrow{font-family:var(--font-mono);font-style:italic;font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--color-pink);margin-bottom:16px;display:inline-flex;align-items:center;gap:10px}
.eyebrow::before,.eyebrow::after{content:'✦';font-size:11px;opacity:.9}
.avatar{width:130px;height:130px;border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 30%,rgba(225,84,99,.28),transparent 65%),rgba(26,15,10,.60);border:3px dashed rgba(255,241,212,.52);font-family:var(--font-mono);font-style:italic;font-size:44px;font-weight:700;color:var(--color-cream-light);box-shadow:0 14px 40px rgba(0,0,0,.55)}
.hero-name{font-family:var(--font-display);font-size:clamp(56px,8.5vw,110px);line-height:.92;color:var(--color-cream-light);text-transform:uppercase;letter-spacing:.03em;text-shadow:0 4px 32px rgba(0,0,0,.55);margin-bottom:8px}
.hero-handle{font-family:var(--font-mono);font-style:italic;font-size:13px;color:rgba(255,241,212,.55);letter-spacing:.12em}

/* stat strip pinned to hero bottom */
.stat-strip{position:absolute;bottom:0;left:0;right:0;display:flex;background:rgba(26,15,10,.55);border-top:1.5px dashed rgba(255,241,212,.22);backdrop-filter:blur(10px)}
.stat-item{flex:1;padding:18px 12px;text-align:center;border-right:1px dashed rgba(255,241,212,.18)}
.stat-item:last-child{border-right:0}
.stat-item .n{font-family:var(--font-display);font-size:36px;letter-spacing:.04em;line-height:1;display:block;color:var(--color-cream-light)}
.stat-item .n.gold{color:#f5c842}
.stat-item .l{font-family:var(--font-mono);font-style:italic;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,241,212,.50);display:block;margin-top:4px}

/* top-right actions */
.hero-actions{position:absolute;top:90px;right:28px;z-index:3;display:flex;gap:8px}
.btn-sm{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;padding:8px 16px;border-radius:9999px;cursor:pointer;transition:all .18s;border:1.5px dashed rgba(255,241,212,.35);background:rgba(26,15,10,.42);color:rgba(255,241,212,.70);backdrop-filter:blur(6px)}
.btn-sm:hover{border-color:var(--color-pink);color:var(--color-pink)}
.btn-sm.danger:hover{border-color:rgba(225,84,99,.6);color:rgba(225,84,99,.8)}

/* ── CONTENT ── */
.profile-content{background:var(--color-purple);background-image:url('assets/Grain_texture_purple.png');background-size:cover;position:relative;z-index:2}
.pc-inner{max-width:1100px;margin:0 auto;padding:56px 28px 88px;display:grid;grid-template-columns:290px 1fr;gap:30px;align-items:start}

/* left column */
.left-col{display:flex;flex-direction:column;gap:18px}
.about-card{position:relative;overflow:hidden;background:url('assets/Grain_texture_light.png') center/cover;border:2px dashed rgba(26,26,26,.40);border-radius:14px;padding:24px 22px}
.about-card::before{content:'';position:absolute;inset:0;background:url('assets/Grain_texture_light2.png') center/40%;opacity:.45;pointer-events:none}
.about-card > *{position:relative;z-index:1}
.card-eyebrow{font-family:var(--font-mono);font-style:italic;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#c1394a;margin-bottom:10px}
.about-text{font-family:var(--font-body);font-style:italic;font-size:14px;line-height:1.72;color:rgba(26,26,26,.82)}
.btn-full{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px 18px;border-radius:9999px;font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:all .18s;border:0;font-weight:700}
.btn-full.pink{background:var(--color-pink);color:#fff;box-shadow:0 4px 16px rgba(225,84,99,.38)}
.btn-full.pink:hover{background:#cf4453;transform:translateY(-1px)}
.btn-full.ghost{background:transparent;color:var(--color-cream-light);border:1.5px dashed rgba(255,241,212,.38)}
.btn-full.ghost:hover{border-color:var(--color-pink);color:var(--color-pink)}
.btn-stack{display:flex;flex-direction:column;gap:9px}

/* right column */
.sec-title{font-family:var(--font-display);font-size:clamp(24px,2.8vw,36px);letter-spacing:.06em;text-transform:uppercase;color:var(--color-cream-light);margin-bottom:20px;display:flex;align-items:center;justify-content:flex-start;gap:14px}
.sec-title .star{color:var(--color-pink);font-size:.75em}
.sec-title .count{font-family:var(--font-mono);font-size:12px;font-style:italic;color:rgba(255,241,212,.55);letter-spacing:.1em;font-weight:400}
.ev-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:40px}
.ev-card{position:relative;padding:20px 22px 18px;border:2px dashed rgba(255,255,255,.42);border-radius:12px;background:rgba(0,0,0,.10);cursor:pointer;transition:border-color .2s,transform .2s;text-decoration:none;display:block}
.ev-card:hover{border-color:var(--color-pink);transform:translateY(-3px)}
.ev-card.upcoming{border-color:rgba(225,84,99,.5)}
.ev-tag{display:inline-block;font-family:var(--font-mono);font-style:italic;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;padding:4px 10px;border-radius:9999px;background:rgba(225,84,99,.18);color:var(--color-pink);border:1px dashed rgba(225,84,99,.42);margin-bottom:12px}
.ev-name{font-family:var(--font-display);font-size:22px;letter-spacing:.03em;color:#fff;text-transform:uppercase;line-height:1.05;margin-bottom:12px}
.ev-meta-row{font-size:12px;color:rgba(255,255,255,.68);display:flex;align-items:center;gap:8px;margin-bottom:4px}
.ev-pts-badge{position:absolute;top:16px;right:16px;background:rgba(245,200,66,.15);border:1px dashed rgba(245,200,66,.5);border-radius:9999px;padding:5px 10px;font-family:var(--font-display);font-size:18px;color:#f5c842;letter-spacing:.03em;line-height:1}

/* past events list */
.past-label{font-family:var(--font-mono);font-style:italic;font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:rgba(255,241,212,.55);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.past-label::before,.past-label::after{content:'';flex:1;height:1px;background:repeating-linear-gradient(90deg,rgba(255,241,212,.2) 0 6px,transparent 6px 12px)}
.ev-list{background:var(--color-dark-brown) url('assets/Grain_texture_brown.png') center/cover;border:1.5px solid rgba(255,255,255,.07);border-radius:14px;padding:6px;box-shadow:0 12px 32px rgba(0,0,0,.4);position:relative}
.ev-list::before{content:'';position:absolute;inset:5px;border:1.5px dashed rgba(255,241,212,.18);border-radius:10px;pointer-events:none}
.ev-list-inner{position:relative;z-index:1;padding:4px 2px}
.ev-row{display:grid;grid-template-columns:76px 1fr 96px 76px;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px dashed rgba(255,241,212,.10);transition:background .18s}
.ev-row:last-child{border-bottom:0}
.ev-row:hover{background:rgba(255,241,212,.04)}
.ev-cat{font-family:var(--font-mono);font-style:italic;font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;padding:4px 9px;border-radius:9999px;background:rgba(225,84,99,.15);color:var(--color-pink);border:1px dashed rgba(225,84,99,.38);text-align:center}
.ev-info .nm{font-weight:600;font-size:14px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-info .loc{font-style:italic;font-size:11.5px;color:rgba(255,241,212,.55);margin-top:2px}
.ev-date{font-family:var(--font-mono);font-style:italic;font-size:11px;color:rgba(255,241,212,.60);text-align:right}
.ev-pts-col{text-align:right;font-family:var(--font-display);font-size:20px;color:#f5c842;line-height:1}
.ev-pts-col .u{font-family:var(--font-mono);font-style:italic;font-size:9px;color:rgba(255,241,212,.45);letter-spacing:.14em;margin-left:2px}
.empty{text-align:center;padding:28px 16px;font-style:italic;color:rgba(255,241,212,.45);font-size:13.5px}

@media(max-width:880px){.pc-inner{grid-template-columns:1fr}.ev-grid{grid-template-columns:1fr}}
@media(max-width:600px){.ev-row{grid-template-columns:64px 1fr 64px;gap:10px}.ev-row .ev-date{display:none}.stat-item .n{font-size:28px}}
</style>
</head>
<body>
<div class="stage"></div>
<div class="grain"></div>

<div id="nav-root"></div>
<script>window.GOL_PAGE='profile'</script>
<script src="nav.js"></script>

<section class="hero">
  <div class="hero-actions">
    <button class="btn-sm">Upravit profil</button>
    <button class="btn-sm">Sdílet</button>
    <button class="btn-sm danger" id="logout-btn">Odhlásit</button>
  </div>
  <div class="hero-inner">
    <div class="eyebrow">Profil hráče · Sezóna 2025/26</div>
    <div class="avatar">LM</div>
    <div class="hero-name">Lukáš Müller</div>
    <div class="hero-handle">@lukasmuller</div>
  </div>
  <div class="stat-strip">
    <div class="stat-item"><span class="n gold">1280</span><span class="l">Bodů · 1. místo</span></div>
    <div class="stat-item"><span class="n">22</span><span class="l">Akcí v sezóně</span></div>
    <div class="stat-item"><span class="n" id="up-count-hero">2</span><span class="l">Nadcházející</span></div>
  </div>
</section>

<section class="profile-content">
  <div class="pc-inner">

    <div class="left-col">
      <div class="about-card">
        <div class="card-eyebrow">— O mně —</div>
        <p class="about-text">Karaoke v sobotu, deskovky ve středu, nahá míle kdykoliv. Hraj naplno, nebo vůbec.</p>
      </div>
      <div class="btn-stack">
        <button class="btn-full pink">Upravit profil</button>
        <button class="btn-full ghost">Sdílet profil</button>
        <button class="btn-full ghost" id="logout-btn2">Odhlásit se</button>
      </div>
    </div>

    <div class="right-col">
      <div class="sec-title"><span class="star">✦</span> Nadcházející akce <span class="count" id="up-count"></span></div>
      <div class="ev-grid" id="upcoming-grid"></div>

      <div class="past-label">Absolvované akce <span id="past-count"></span></div>
      <div class="ev-list" id="past-list"></div>
    </div>

  </div>
</section>

<div id="footer-root"></div>
<script src="footer.js"></script>

<script>
document.getElementById('logout-btn').addEventListener('click',()=>{localStorage.removeItem('gol_user');window.location.href='index.html'});
document.getElementById('logout-btn2').addEventListener('click',()=>{localStorage.removeItem('gol_user');window.location.href='index.html'});

const TODAY=new Date('2026-04-29');
const months=['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
const fmt=iso=>{const d=new Date(iso);return `${d.getDate()}. ${months[d.getMonth()]}`};

const EVENTS=[
  {cat:'Běh',nm:'C50',city:'Brno',loc:'Bystrc',date:'2026-06-02',pts:120},
  {cat:'Tanec',nm:'Game of Life Dance Class',city:'Praha',loc:'Karlín',date:'2026-05-18',pts:50},
  {cat:'Karaoke',nm:'Karaoke TOUR 2025',city:'Ostrava',loc:'Stodolní',date:'2025-11-20',pts:70},
  {cat:'Akce',nm:'Kokosy na sněhu',city:'Beskydy',loc:'Pustevny',date:'2025-12-15',pts:100},
  {cat:'Běh',nm:'Christmas Run',city:'Brno',loc:'Náměstí Svobody',date:'2025-12-22',pts:80},
  {cat:'Bruslení',nm:'Naked Ice Skating',city:'Praha',loc:'Štvanice',date:'2026-01-18',pts:100},
  {cat:'Akce',nm:'Deskovky Night',city:'Plzeň',loc:'Centrum',date:'2025-11-05',pts:30}
];

const upcoming=EVENTS.filter(e=>new Date(e.date)>=TODAY).sort((a,b)=>new Date(a.date)-new Date(b.date));
const past=EVENTS.filter(e=>new Date(e.date)<TODAY).sort((a,b)=>new Date(b.date)-new Date(a.date));

document.getElementById('up-count').textContent=upcoming.length;
document.getElementById('up-count-hero').textContent=upcoming.length;
document.getElementById('past-count').textContent=past.length;

const grid=document.getElementById('upcoming-grid');
if(upcoming.length){
  grid.innerHTML=upcoming.map(ev=>`
    <div class="ev-card upcoming">
      <div class="ev-pts-badge">+${ev.pts}</div>
      <span class="ev-tag">${ev.cat}</span>
      <div class="ev-name">${ev.nm}</div>
      <div class="ev-meta-row">📅 ${fmt(ev.date)}</div>
      <div class="ev-meta-row">📍 ${ev.city}, ${ev.loc}</div>
    </div>`).join('');
}else{grid.innerHTML='<div class="empty">Žádné nadcházející akce.</div>'}

function renderRow(ev){return `<div class="ev-row"><span class="ev-cat">${ev.cat}</span><div class="ev-info"><div class="nm">${ev.nm}</div><div class="loc">📍 ${ev.city}, ${ev.loc}</div></div><div class="ev-date">${fmt(ev.date)}</div><div class="ev-pts-col">+${ev.pts}<span class="u">pts</span></div></div>`}
document.getElementById('past-list').innerHTML=past.length?'<div class="ev-list-inner">'+past.map(renderRow).join('')+'</div>':'<div class="empty">Zatím žádné akce.</div>';
</script>
</body>
</html>
