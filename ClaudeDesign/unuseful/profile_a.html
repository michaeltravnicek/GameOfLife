<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Profil A — Game of Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="colors_and_type.css" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);color:var(--color-cream-light);-webkit-font-smoothing:antialiased;min-height:100vh;background:#1a0f0a;overflow-x:hidden}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer}
a{color:inherit;text-decoration:none}

/* ── same stage/grain as leaderboard.html ── */
.stage{position:fixed;inset:0;z-index:-2;background:url('gallery/gal3.jpg') center 28%/cover no-repeat;filter:saturate(.7) contrast(1.02);transform:scale(1.05)}
.stage::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 15%,rgba(45,42,142,.10) 0%,transparent 55%),linear-gradient(180deg,rgba(45,42,142,.08) 0%,rgba(26,15,10,.60) 50%,rgba(26,15,10,.82) 100%)}
.grain{position:fixed;inset:0;z-index:-1;pointer-events:none;background:url('assets/Grain_texture_blue.png') center/cover;opacity:.08;mix-blend-mode:overlay}

/* ── HERO: same pattern as leaderboard ── */
.hero{position:relative;z-index:2;max-width:880px;margin:0 auto;padding:148px 24px 8px;text-align:center}
.eyebrow{font-family:var(--font-mono);font-style:italic;font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--color-pink);margin-bottom:14px;display:inline-flex;align-items:center;gap:10px}
.eyebrow::before,.eyebrow::after{content:'✦';font-size:11px;opacity:.9}
.avatar{width:148px;height:148px;border-radius:50%;margin:0 auto 22px;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 30%,rgba(225,84,99,.30),transparent 65%),rgba(26,15,10,.65);border:3px dashed rgba(255,241,212,.55);font-family:var(--font-mono);font-style:italic;font-size:48px;font-weight:700;color:var(--color-cream-light);box-shadow:0 14px 36px rgba(0,0,0,.5)}
.hero h1{font-family:var(--font-display);font-size:clamp(56px,8vw,108px);line-height:.92;color:var(--color-cream-light);text-transform:uppercase;letter-spacing:.04em;text-shadow:0 6px 34px rgba(0,0,0,.6);margin-bottom:6px}
.handle{font-family:var(--font-mono);font-style:italic;font-size:13px;color:rgba(255,241,212,.55);letter-spacing:.12em;margin-bottom:10px}
.tagline{font-family:var(--font-body);font-style:italic;font-size:14px;color:rgba(255,241,212,.62);max-width:440px;margin:0 auto}
.divider{width:120px;height:1px;margin:24px auto 0;background:repeating-linear-gradient(90deg,rgba(255,241,212,.45) 0 5px,transparent 5px 10px)}

/* actions row */
.actions{position:relative;z-index:2;max-width:880px;margin:28px auto 0;padding:0 24px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.btn-pill{display:inline-flex;align-items:center;gap:8px;background:var(--color-pink);color:#fff;border:0;font-family:var(--font-mono);font-size:11.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:10px 22px;border-radius:9999px;box-shadow:0 4px 16px rgba(225,84,99,.40);transition:transform .18s,background .18s;cursor:pointer;text-decoration:none}
.btn-pill:hover{background:#cf4453;transform:translateY(-1px)}
.btn-pill.ghost{background:transparent;color:var(--color-cream-light);border:1.5px dashed rgba(255,241,212,.38);box-shadow:none}
.btn-pill.ghost:hover{border-color:var(--color-pink);color:var(--color-pink)}

/* ── CONTROLS: same pattern as leaderboard ── */
.controls{position:relative;z-index:2;max-width:880px;margin:32px auto 0;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}
.tabs{display:inline-flex;padding:5px;gap:5px;background:rgba(26,15,10,.45);border:1.5px dashed rgba(255,241,212,.32);border-radius:9999px;backdrop-filter:blur(8px)}
.tab{font-family:var(--font-body);font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:9px 20px;border-radius:9999px;cursor:pointer;background:transparent;border:0;color:rgba(255,241,212,.75);transition:all .18s}
.tab:hover{color:#fff}
.tab.on{background:var(--color-pink);color:#fff;box-shadow:0 4px 14px rgba(225,84,99,.45)}
.tab-count{display:inline-block;background:rgba(255,255,255,.18);border-radius:9999px;padding:0 7px;font-size:10px;margin-left:4px;letter-spacing:0}

main.profile-main{position:relative;z-index:2;max-width:880px;margin:0 auto;padding:32px 24px 80px}

/* ── UPCOMING: index.html event card style inside purple section ── */
.upcoming-section{background:var(--color-purple);background-image:url('assets/Grain_texture_purple.png');background-size:cover;padding:48px 24px 64px;position:relative;z-index:2}
.sec-title{font-family:var(--font-display);font-size:clamp(24px,3vw,38px);letter-spacing:.06em;text-transform:uppercase;color:var(--color-cream-light);text-align:center;margin-bottom:32px;display:flex;align-items:center;justify-content:center;gap:14px}
.sec-title .star{color:var(--color-pink);font-size:.7em}
.events-grid{max-width:880px;margin:0 auto;display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.ev-card{position:relative;padding:22px 22px 20px;border:2px dashed rgba(255,255,255,.44);border-radius:12px;background:rgba(0,0,0,.10);min-height:148px;cursor:pointer;transition:border-color .2s,transform .2s}
.ev-card:hover{border-color:var(--color-pink);transform:translateY(-3px)}
.ev-tag{display:inline-block;font-family:var(--font-mono);font-style:italic;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;padding:4px 10px;border-radius:9999px;background:rgba(225,84,99,.18);color:var(--color-pink);border:1px dashed rgba(225,84,99,.42);margin-bottom:12px}
.ev-name{font-family:var(--font-display);font-size:24px;line-height:1.05;color:#fff;text-transform:uppercase;letter-spacing:.02em;margin-bottom:14px}
.ev-meta-row{font-size:12px;color:rgba(255,255,255,.68);display:flex;align-items:center;gap:8px;margin-bottom:4px}
.ev-pts-badge{position:absolute;top:14px;right:14px;background:rgba(245,200,66,.15);border:1px dashed rgba(245,200,66,.5);border-radius:9999px;padding:4px 10px;font-family:var(--font-display);font-size:18px;color:#f5c842;line-height:1}
.empty-up{text-align:center;padding:40px 0;font-style:italic;color:rgba(255,241,212,.50);font-size:14px}

/* ── PAST: blue grain list identical to leaderboard ── */
.list-label{font-family:var(--font-mono);font-style:italic;font-size:13px;letter-spacing:.26em;text-transform:uppercase;color:rgba(255,241,212,.75);margin:0 6px 18px;display:flex;align-items:center;gap:14px}
.list-label::before,.list-label::after{content:'';flex:1;height:1px;background:repeating-linear-gradient(90deg,rgba(255,241,212,.3) 0 6px,transparent 6px 12px)}
.list{position:relative;padding:10px;background:#1a0f0a url('assets/Grain_texture_blue.png') center/cover;border:1.5px solid rgba(255,255,255,.08);border-radius:14px;box-shadow:0 20px 44px rgba(0,0,0,.5)}
.list::before{content:'';position:absolute;inset:6px;border:1.5px dashed rgba(255,241,212,.22);border-radius:10px;pointer-events:none}
.list-inner{position:relative;z-index:1;padding:6px 4px}
.row{display:grid;grid-template-columns:80px 1fr 110px 90px;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px dashed rgba(255,241,212,.10);transition:background .18s,transform .18s}
.row:last-child{border-bottom:0}
.row:hover{background:rgba(255,241,212,.05);transform:translateX(2px)}
.ev-cat{font-family:var(--font-mono);font-style:italic;font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;padding:4px 9px;border-radius:9999px;background:rgba(225,84,99,.15);color:var(--color-pink);border:1px dashed rgba(225,84,99,.35);text-align:center}
.ev-info .nm{font-weight:600;font-size:14.5px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-info .loc{font-style:italic;font-size:11.5px;color:rgba(255,241,212,.52);margin-top:2px}
.ev-date{font-family:var(--font-mono);font-style:italic;font-size:11px;color:rgba(255,241,212,.55);text-align:right}
.ev-pts{text-align:right;font-family:var(--font-display);font-size:22px;letter-spacing:.03em;color:#f5c842;line-height:1}
.ev-pts .u{font-family:var(--font-mono);font-style:italic;font-size:10px;color:rgba(255,241,212,.45);letter-spacing:.14em;margin-left:3px}
.empty{text-align:center;padding:44px 20px;font-family:var(--font-body);font-style:italic;color:rgba(255,241,212,.55);font-size:14px}

@media(max-width:640px){.events-grid{grid-template-columns:1fr}.row{grid-template-columns:64px 1fr 70px;gap:10px}.row .ev-date{display:none}}
</style>
</head>
<body>
<div class="stage"></div>
<div class="grain"></div>

<div id="nav-root"></div>
<script>window.GOL_PAGE='profile'</script>
<script src="nav.js"></script>

<header class="hero">
  <div class="eyebrow">Profil hráče · Sezóna 2025/26</div>
  <div class="avatar">LM</div>
  <h1>Lukáš Müller</h1>
  <div class="handle">@lukasmuller</div>
  <p class="tagline">Karaoke v sobotu, deskovky ve středu, nahá míle kdykoliv.</p>
  <div class="divider"></div>
</header>

<div class="actions">
  <button class="btn-pill">Upravit profil</button>
  <button class="btn-pill ghost">Sdílet profil</button>
  <button class="btn-pill ghost" id="logout-btn">Odhlásit se</button>
</div>

<div class="controls">
  <div class="tabs">
    <button class="tab on" data-tab="up">Nadcházející <span class="tab-count" id="up-count">2</span></button>
    <button class="tab" data-tab="past">Absolvované <span class="tab-count" id="past-count">5</span></button>
  </div>
  <div style="font-family:var(--font-mono);font-style:italic;font-size:12px;color:rgba(255,241,212,.45)">🏆 1. místo · 1 280 bodů · 22 akcí</div>
</div>

<!-- upcoming: purple grain cards (index.html style) -->
<div id="tab-up">
  <section class="upcoming-section">
    <h2 class="sec-title"><span class="star">✦</span> Nadcházející akce <span class="star">✦</span></h2>
    <div class="events-grid" id="upcoming-grid"></div>
  </section>
</div>

<!-- past: blue grain leaderboard-list style -->
<main class="profile-main" id="tab-past" style="display:none">
  <div class="list-label">Absolvované akce</div>
  <div class="list"><div class="list-inner" id="past-list"></div></div>
</main>

<div id="footer-root"></div>
<script src="footer.js"></script>

<script>
document.getElementById('logout-btn').addEventListener('click',()=>{localStorage.removeItem('gol_user');window.location.href='index.html'});

const TODAY=new Date('2026-04-29');
const months=['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
const fmt=iso=>{const d=new Date(iso);return `${d.getDate()}. ${months[d.getMonth()]}`};
const EVENTS=[
  {cat:'Běh',nm:'C50',city:'Brno',loc:'Bystrc',date:'2026-06-02',pts:120},
  {cat:'Tanec',nm:'Game of Life Dance Class',city:'Praha',loc:'Karlín',date:'2026-05-18',pts:50},
  {cat:'Karaoke',nm:'Karaoke TOUR 2025',city:'Ostrava',loc:'Stodolní',date:'2025-11-20',pts:70},
  {cat:'Akce',nm:'Kokosy na sněhu',city:'Beskydy',loc:'Pustevny',date:'2025-12-15',pts:100},
  {cat:'Běh',nm:'Christmas Run',city:'Brno',loc:'Náměstí Svobody',date:'2025-12-22',pts:80},
  {cat:'Bruslení',nm:'Naked Ice Skating',city:'Praha',loc:'Štvanice',date:'2026-01-18',pts:100},
  {cat:'Akce',nm:'Deskovky Night',city:'Plzeň',loc:'Centrum',date:'2025-11-05',pts:30}
];
const upcoming=EVENTS.filter(e=>new Date(e.date)>=TODAY).sort((a,b)=>new Date(a.date)-new Date(b.date));
const past=EVENTS.filter(e=>new Date(e.date)<TODAY).sort((a,b)=>new Date(b.date)-new Date(a.date));

document.getElementById('up-count').textContent=upcoming.length;
document.getElementById('past-count').textContent=past.length;

const grid=document.getElementById('upcoming-grid');
grid.innerHTML=upcoming.length?upcoming.map(ev=>`
  <div class="ev-card">
    <div class="ev-pts-badge">+${ev.pts}</div>
    <span class="ev-tag">${ev.cat}</span>
    <div class="ev-name">${ev.nm}</div>
    <div class="ev-meta-row">📅 ${fmt(ev.date)}</div>
    <div class="ev-meta-row">📍 ${ev.city}, ${ev.loc}</div>
  </div>`).join(''):'<div class="empty-up">Žádné nadcházející akce.</div>';

function renderRow(ev){return `<div class="row"><span class="ev-cat">${ev.cat}</span><div class="ev-info"><div class="nm">${ev.nm}</div><div class="loc">📍 ${ev.city}, ${ev.loc}</div></div><div class="ev-date">${fmt(ev.date)}</div><div class="ev-pts">+${ev.pts}<span class="u">pts</span></div></div>`}
document.getElementById('past-list').innerHTML=past.length?past.map(renderRow).join(''):'<div class="empty">Zatím žádné akce.</div>';

document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    const t=btn.dataset.tab;
    document.getElementById('tab-up').style.display=t==='up'?'block':'none';
    document.getElementById('tab-past').style.display=t==='past'?'block':'none';
  });
});
</script>
</body>
</html>
